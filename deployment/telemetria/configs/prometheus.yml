global:
  scrape_interval:     5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: authors-app
    scrape_interval: 10s
    metrics_path: /q/metrics
    static_configs:
      - targets: ['authors-app:8080']
  - job_name: books-app
    scrape_interval: 10s
    metrics_path: /q/metrics
    static_configs:
      - targets: [ 'books-app:8080' ]
  - job_name: customers-app
    scrape_interval: 10s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'customers-app:8080' ]

